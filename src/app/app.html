<div class="toolbar">
  <button class="dark-mode-btn" (click)="theme.toggleDarkMode()">
    <fa-icon [icon]="theme.isDarkMode() ? faMoon : faSun"></fa-icon>
    <span>{{ theme.isDarkMode() ? 'Dark' : 'Light' }}</span>
  </button>

  <div class="language-select-wrapper">
  <select class="language-select" [value]="translate.currentLang" (change)="changeLanguage($event)">
      <option *ngFor="let lang of languages" [value]="lang.code">{{ lang.label }}</option>
    </select>
    <fa-icon [icon]="faCaretDown" class="select-caret"></fa-icon>
  </div>
</div>
<div class="header-nav">
  <span class="app-title">Contributions</span>
</div>

<app-heatmap></app-heatmap>
